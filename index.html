<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empress Spade — Coming Soon</title>

<!-- Google Fonts: Ubuntu -->
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #FFE77A;       /* yellow background */
    --text: #171133;     /* darkest color */
    --header: #8D637A;   /* plum for headers */
    --pink: #F5B2D4;     /* button background */
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Ubuntu', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    flex-direction: column;
}

header img {
    max-width: 700px;
    width: 80%;
    height: auto;
    margin-bottom: 40px;
}

h2 {
    font-size: 36px;
    margin: 0 0 40px 0;
    color: var(--header);
    text-transform: uppercase;
}

/* Social buttons */
.social-buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

.social-buttons a {
    text-decoration: none;
    color: var(--text);
    background: var(--pink);
    padding: 10px 20px;
    border-radius: 25px;
    font-weight: 700;
    text-transform: uppercase; /* make text uppercase */
    transition: transform 0.2s, background 0.2s;
}

.social-buttons a:hover {
    transform: scale(1.05);
    background: #f0a8ca; /* slightly darker pink on hover */
}

/* Responsive */
@media (max-width: 600px) {
    header img { max-width: 300px; }
    h2 { font-size: 28px; }
    .social-buttons a { padding: 8px 16px; font-size: 14px; }
}
</style>
</head>

<body>

<header>
    <img src="logo_hero.png" alt="Empress Spade Logo">
</header>

<h2>Coming Soon</h2>

<div class="social-buttons">
    <a href="https://www.instagram.com/empressspade" target="_blank">Instagram</a>
    <a href="https://www.youtube.com/@empressspade" target="_blank">YouTube</a>
    <a href="https://twitter.com/empressspade" target="_blank">X</a>
    <a href="https://www.facebook.com/Empress.Spade1" target="_blank">Facebook</a>
</div>

</body>
</html>
