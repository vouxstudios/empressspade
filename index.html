<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empress Spade — Coming Soon</title>

<style>
:root {
    --bg: #FFE77A;       /* yellow background */
    --text: #171133;     /* darkest color for main text */
    --header: #8D637A;   /* plum for headers */
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: Georgia, "Times New Roman", serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

header img {
    max-width: 250px;
    width: 60%;
    height: auto;
    margin-bottom: 20px;
}

h2 {
    font-size: 32px;
    margin: 0;
    color: var(--header);
}

/* Responsive for mobile */
@media (max-width: 600px) {
    header img { max-width: 180px; }
    h2 { font-size: 24px; }
}
</style>
</head>

<body>
<div class="wrapper">
    <header>
        <img src="logo_hero.png" alt="Empress Spade Logo">
    </header>
    <h2>Coming Soon</h2>
</div>
</body>
</html>
