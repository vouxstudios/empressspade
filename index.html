<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empress Spade — Coming Soon</title>

<!-- FontAwesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-dT9X/tNvl7cZ2b6+6Zf2KpLlF7kK3Zss2Fbk+GfFZo/ePQV6Gq3wD7Ho3nY13lw4aK0Yk9nN/7jkXJ3G7G90Hw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
:root {
    --bg: #FFE77A;       /* yellow background */
    --text: #171133;     /* darkest color */
    --header: #8D637A;   /* plum for headers */
    --pink: #F5B2D4;     /* circle background */
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: Georgia, "Times New Roman", serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    flex-direction: column;
}

header img {
    max-width: 600px;
    width: 80%;
    height: auto;
    margin-bottom: 40px;
}

h2 {
    font-size: 36px;
    margin: 0 0 50px 0;
    color: var(--header);
}

/* Social icons container */
.social-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-icons a {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 50px;
    height: 50px;
    background: var(--pink);
    color: var(--text);
    border-radius: 50%;
    font-size: 24px;
    text-decoration: none;
    transition: transform 0.2s;
}

.social-icons a:hover {
    transform: scale(1.1);
}

/* Responsive */
@media (max-width: 600px) {
    header img { max-width: 300px; }
    h2 { font-size: 28px; }
    .social-icons a { width: 40px; height: 40px; font-size: 20px; }
}
</style>
</head>

<body>

<header>
    <img src="logo_hero.png" alt="Empress Spade Logo">
</header>

<h2>Coming Soon</h2>

<div class="social-icons">
    <a href="https://www.instagram.com/empressspade" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/@empressspade" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
    <a href="https://twitter.com/empressspade" target="_blank" aria-label="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
    <a href="https://www.facebook.com/Empress.Spade1" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
</div>

</body>
</html>
